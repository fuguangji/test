<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Audio Art Visualizer</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#050816;
  font-family:sans-serif;
}

canvas{
  display:block;
}

#ui{
  position:fixed;
  top:20px;
  left:20px;
  z-index:10;
}

input{
  color:white;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  padding:10px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

.info{
  position:fixed;
  bottom:20px;
  left:20px;
  color:rgba(255,255,255,0.5);
  font-size:12px;
  letter-spacing:1px;
}

</style>
</head>

<body>

<div id="ui">
  <input type="file" id="fileInput" accept=".mp3,audio/*">
</div>

<div class="info">
  MUSIC PARTICLE SPACE
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* =========================================================
   Scene
========================================================= */

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(
  0x050816,
  0.025
);

/* =========================================================
   Camera
========================================================= */

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0, 0, 22);

/* =========================================================
   Renderer
========================================================= */

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  alpha:true
});

renderer.setSize(
  window.innerWidth,
  window.innerHeight
);

renderer.setPixelRatio(
  Math.min(window.devicePixelRatio, 2)
);

document.body.appendChild(renderer.domElement);

/* =========================================================
   Lights
========================================================= */

const ambient = new THREE.AmbientLight(
  0xffffff,
  1.2
);

scene.add(ambient);

const point = new THREE.PointLight(
  0xaaccff,
  25,
  100
);

point.position.set(0, 10, 15);

scene.add(point);

/* =========================================================
   Sphere
========================================================= */

const sphereGeometry = new THREE.SphereGeometry(
  2,
  64,
  64
);

const sphereMaterial = new THREE.MeshPhysicalMaterial({

  color:0xaaccff,

  transparent:true,

  opacity:0.82,

  roughness:0.12,

  metalness:0.03,

  transmission:0.9,

  thickness:1.5,

  clearcoat:1
});

const sphere = new THREE.Mesh(
  sphereGeometry,
  sphereMaterial
);

scene.add(sphere);

/* =========================================================
   Glow Shell
========================================================= */

const glowGeometry = new THREE.SphereGeometry(
  2.6,
  64,
  64
);

const glowMaterial = new THREE.MeshBasicMaterial({

  color:0x88bbff,

  transparent:true,

  opacity:0.08
});

const glowSphere = new THREE.Mesh(
  glowGeometry,
  glowMaterial
);

scene.add(glowSphere);

/* =========================================================
   Background Particles
========================================================= */

const particleCount = 1200;

const particleGeometry = new THREE.BufferGeometry();

const particlePositions = new Float32Array(
  particleCount * 3
);

for(let i=0;i<particleCount;i++){

  particlePositions[i*3+0] =
    (Math.random()-0.5)*120;

  particlePositions[i*3+1] =
    (Math.random()-0.5)*120;

  particlePositions[i*3+2] =
    (Math.random()-0.5)*120;
}

particleGeometry.setAttribute(
  'position',
  new THREE.BufferAttribute(
    particlePositions,
    3
  )
);

const particleMaterial = new THREE.PointsMaterial({

  color:0x99bbff,

  size:0.12,

  transparent:true,

  opacity:0.22
});

const particles = new THREE.Points(
  particleGeometry,
  particleMaterial
);

scene.add(particles);

/* =========================================================
   Audio
========================================================= */

let audioContext;
let analyser;
let dataArray;

/* =========================================================
   Motion State
========================================================= */

let currentZ = 0;
let targetZ = 0;
let velocityZ = 0;

let currentScale = 1;
let targetScale = 1;

let lastStableZ = 0;

/* =========================================================
   Upload
========================================================= */

const fileInput =
  document.getElementById("fileInput");

fileInput.addEventListener(
  "change",
  async (e)=>{

    const file = e.target.files[0];

    if(!file) return;

    if(audioContext){
      audioContext.close();
    }

    audioContext = new AudioContext();

    const audio = new Audio();

    audio.src =
      URL.createObjectURL(file);

    audio.loop = true;

    audio.crossOrigin = "anonymous";

    const source =
      audioContext.createMediaElementSource(audio);

    analyser =
      audioContext.createAnalyser();

    analyser.fftSize = 512;

    dataArray =
      new Uint8Array(
        analyser.frequencyBinCount
      );

    source.connect(analyser);

    analyser.connect(
      audioContext.destination
    );

    await audio.play();
});

/* =========================================================
   Frequency Mapping
========================================================= */

function mapFrequencyToZ(freq){

  const minFreq = 20;
  const maxFreq = 20000;

  const normalized =

    (
      Math.log2(freq + 1) -
      Math.log2(minFreq)
    )

    /

    (
      Math.log2(maxFreq) -
      Math.log2(minFreq)
    );

  return normalized * 18;
}

/* =========================================================
   Animation
========================================================= */

function animate(){

  requestAnimationFrame(animate);

  const t =
    performance.now() * 0.001;

  /* ------------------------
     Audio Analysis
  ------------------------ */

  if(analyser){

    analyser.getByteFrequencyData(
      dataArray
    );

    let maxEnergy = 0;

    let dominantIndex = 0;

    for(let i=0;i<dataArray.length;i++){

      if(dataArray[i] > maxEnergy){

        maxEnergy = dataArray[i];

        dominantIndex = i;
      }
    }

    /* ------------------------
       Dominant Frequency
    ------------------------ */

    const dominantFrequency =

      dominantIndex *

      audioContext.sampleRate /

      analyser.fftSize;

    let z = mapFrequencyToZ(
      dominantFrequency
    );

    /* ------------------------
       Stability Threshold
    ------------------------ */

    if(
      Math.abs(z - lastStableZ)
      > 0.4
    ){
      targetZ = z;
      lastStableZ = z;
    }

    /* ------------------------
       Spring Motion
    ------------------------ */

    velocityZ +=
      (targetZ - currentZ)
      * 0.03;

    velocityZ *= 0.92;

    currentZ += velocityZ;

    /* ------------------------
       Energy Compression
    ------------------------ */

    const energy = Math.pow(
      maxEnergy / 255,
      1.5
    );

    /* ------------------------
       Scale
    ------------------------ */

    targetScale =
      1.5 +
      energy * 2.4;

    currentScale +=
      (
        targetScale -
        currentScale
      )
      * 0.08;

    sphere.scale.setScalar(
      currentScale
    );

    glowSphere.scale.setScalar(
      currentScale * 1.15
    );

    /* ------------------------
       Floating Motion
    ------------------------ */

    sphere.position.z =
      -currentZ;

    glowSphere.position.z =
      -currentZ;

    sphere.position.y =
      Math.sin(t * 0.7) * 0.6;

    glowSphere.position.y =
      sphere.position.y;

    sphere.position.x =
      Math.cos(t * 0.4) * 0.4;

    glowSphere.position.x =
      sphere.position.x;

    /* ------------------------
       Beat Pulse
    ------------------------ */

    glowMaterial.opacity =
      0.05 +
      energy * 0.18;

    /* ------------------------
       Rotation
    ------------------------ */

    sphere.rotation.y += 0.002;

    sphere.rotation.x += 0.001;
  }

  /* =====================================================
     Camera Drift
  ===================================================== */

  camera.position.x =
    Math.sin(t * 0.12) * 1.5;

  camera.position.y =
    Math.cos(t * 0.08) * 0.8;

  camera.lookAt(0,0,0);

  /* =====================================================
     Particle Drift
  ===================================================== */

  particles.rotation.y += 0.0003;

  particles.rotation.x += 0.0001;

  /* =====================================================
     Render
  ===================================================== */

  renderer.render(
    scene,
    camera
  );
}

animate();

/* =========================================================
   Resize
========================================================= */

window.addEventListener(
  "resize",
  ()=>{

    camera.aspect =
      window.innerWidth /
      window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );
});

</script>

</body>
</html>
